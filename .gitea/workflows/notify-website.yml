# Triggered when /docs/ (or README) changes in this app repo.
# Fires a workflow_dispatch on VoxCloud/website/deploy.yml, which rebuilds
# and redeploys voxcloud.nl/docs with the latest content.
#
# Note: Gitea 1.25 only supports the GitHub-style workflow_dispatch endpoint
# (/actions/workflows/<file>/dispatches). The older repository_dispatch
# endpoint (/dispatches) returns 404 even though deploy.yml declares both
# triggers — earlier versions of this workflow targeted that endpoint and
# were silently failing.

name: Notify VoxCloud website on docs change

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'README.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VoxCloud/website deploy workflow
        env:
          TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main","inputs":{}}' \
            https://gitea.rikdekker.nl/api/v1/repos/VoxCloud/website/actions/workflows/deploy.yml/dispatches
          echo "Dispatch sent for ${{ gitea.repository }}@${{ gitea.sha }}"
